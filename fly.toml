# fly.toml app configuration file generated for skybot-proxy on 2026-03-02T15:30:19+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'skybot-proxy'
primary_region = 'sin'

[build]

[deploy]
  strategy = 'canary'

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  TARGET_URL = 'https://www.tokocrypto.com'
  CORS_ORIGIN = '*'
  LOG_LEVEL = 'info'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'
    protocol = 'http'
    tls_skip_verify = false

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
